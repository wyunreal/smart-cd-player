{{- if .Values.ingress.enabled -}}
{{- $fullName := include "cd-manager.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "cd-manager.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $svcPort }}
          {{- end }}
    {{- end }}
{{- end }}
---
{{- if and .Values.ingress.enabled .Values.services.audioStreamer }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "cd-manager.fullname" . }}-strip-audio-stream
spec:
  stripPrefix:
    prefixes:
      - /audio-stream
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "cd-manager.fullname" . }}-audio-stream
  labels:
    {{- include "cd-manager.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    traefik.ingress.kubernetes.io/router.middlewares: default-{{ include "cd-manager.fullname" . }}-strip-audio-stream@kubernetescrd
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /audio-stream
            pathType: Prefix
            backend:
              service:
                name: {{ $.Values.services.audioStreamer.name }}
                port:
                  number: {{ $.Values.services.audioStreamer.port }}
    {{- end }}
{{- end }}
