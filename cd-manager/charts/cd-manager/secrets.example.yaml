# secrets.yaml (DO NOT COMMIT THIS FILE - it is gitignored)
#
# Option 1 (recommended): Sealed Secrets
#   1. Copy this file to secrets.yaml and fill in your values
#   2. Run: ./scripts/seal-secrets.sh
#   3. Commit the generated sealed-secret.yaml (safe to commit - encrypted)
#   4. Deploy normally with: ./scripts/deploy-remote-k3s.sh <user> <host>
#
# Option 2 (legacy): Plaintext secrets
#   1. Copy this file to secrets.yaml and fill in your values
#   2. Deploy with: ./scripts/deploy-remote-k3s.sh <user> <host>
#   The deploy script will pass secrets.yaml directly to Helm (never committed)

secrets:
  authSecret: "YOUR_GENERATED_AUTH_SECRET"
  discogsUserToken: "YOUR_DISCOGS_TOKEN"
  googleClientId: "YOUR_GOOGLE_CLIENT_ID"
  googleClientSecret: "YOUR_GOOGLE_CLIENT_SECRET"

  # Security allowlists
  allowedEmails: "user1@gmail.com,user2@gmail.com"       # Required: comma-separated emails allowed to sign in (empty = no one can login)
  allowedProxyOrigins: ""                                  # Optional: comma-separated origins (e.g., "http://192.168.1.100:8080"). .local URLs are always allowed
  allowedImageOrigins: ""                                  # Optional: additional image CDN origins. Spotify, Discogs, Google are built-in
