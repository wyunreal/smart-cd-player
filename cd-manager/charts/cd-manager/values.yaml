replicaCount: 1

image:
  repository: cd-manager
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
# hostNetwork is required for mDNS/Avahi discovery of local CD player hardware
hostNetwork: true

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  {}
  # fsGroup: 2000

securityContext:
  runAsUser: 1001
  runAsGroup: 1001
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      - NET_RAW  # Required for mDNS resolution of .local hostnames via Avahi

service:
  type: NodePort
  port: 3000
  nodePort: 30000 # Optional: Specify a static port (30000-32767) when type is NodePort

ingress:
  enabled: true
  className: ""
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: web.smart-cd.app
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: cd-manager-tls
      hosts:
        - web.smart-cd.app

resources:
  {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

persistence:
  enabled: true
  accessMode: ReadWriteOnce
  size: 1Gi
  # storageClass: ""

env:
  DATA_DIR: "/app/data"
  IMAGES_DIR: "/app/data/images"
  AUTH_TRUST_HOST: "true"
  NEXTAUTH_URL: "https://web.smart-cd.app"
  # COMPOSITE_VIDEO_PARSER_URL is auto-generated from shared-services.yaml

  # The secret must contain keys: AUTH_SECRET, DISCOGS_USER_TOKEN, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
  # and security config: ALLOWED_EMAILS, ALLOWED_PROXY_ORIGINS, ALLOWED_IMAGE_ORIGINS
  existingSecret: ""

filebrowser:
  enabled: true
  image:
    repository: filebrowser/filebrowser
    tag: latest
    pullPolicy: IfNotPresent
  settings:
    port: 8082
    root: /data
    database: /data/filebrowser.db
    # WARNING: FileBrowser default credentials are admin/admin - change immediately after first login
  service:
    nodePort: 30001
