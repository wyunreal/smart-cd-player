# Shared service registry for cross-service references.
# Both cd-manager and composite-video-parser deploy scripts
# include this file via: helm upgrade --install ... -f ../../shared-services.yaml
#
# When renaming a service or changing its port, update it here
# and redeploy both services.

services:
  compositeVideoParser:
    name: composite-video-parser
    port: 3100
  cdManager:
    name: cd-manager
    port: 3000
