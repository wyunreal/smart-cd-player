replicaCount: 1

image:
  repository: audio-streamer
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext:
  privileged: true
  runAsUser: 0

hostNetwork: false
dnsPolicy: ClusterFirst

service:
  type: NodePort
  port: 3200
  nodePort: 30003

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}

env:
  PORT: "3200"
  # Path to the JSON config file inside the container.
  # The config file defines audio profiles (device, sampleRate, channels, inputCodec).
  # Set AUDIO_PROFILE to override the activeProfile from the config file.
  AUDIO_CONFIG: "/app/audio-config.json"

# Mount /dev/snd from the host so FFmpeg can access the ALSA sound card.
audioDevice:
  enabled: true
  hostPath: /dev/snd
