replicaCount: 1

image:
  repository: audio-streamer
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext:
  privileged: true
  runAsUser: 0

# Share host network namespace so mediasoup WebRTC UDP ports (20000-20100)
# are directly reachable without NodePort UDP gymnastics.
hostNetwork: true
dnsPolicy: ClusterFirstWithHostNet

service:
  type: NodePort
  port: 3200
  nodePort: 30003

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}

env:
  PORT: "3200"
  # REQUIRED: set to the IP of the k3s node so WebRTC ICE candidates are reachable.
  # Override via secrets.yaml or --set env.ANNOUNCED_IP=<node-ip>
  ANNOUNCED_IP: "192.168.68.50"
  # ALSA capture device on the host (hw:<card>,<device>).
  # Run `arecord -l` on the host to list available cards.
  AUDIO_DEVICE: "hw:0,0"
  # UDP port range allocated for WebRTC media (must be open on the host firewall).
  MEDIASOUP_MIN_PORT: "20000"
  MEDIASOUP_MAX_PORT: "20100"

# Mount /dev/snd from the host so FFmpeg can access the ALSA sound card.
audioDevice:
  enabled: true
  hostPath: /dev/snd
