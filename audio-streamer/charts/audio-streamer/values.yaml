replicaCount: 1

image:
  repository: audio-streamer
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext:
  privileged: true
  runAsUser: 0

hostNetwork: false
dnsPolicy: ClusterFirst

service:
  type: NodePort
  port: 3200
  nodePort: 30003

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}

env:
  PORT: "3200"
  # ALSA capture device on the host (hw:<card>,<device>).
  # Run `arecord -l` on the host to list available cards.
  AUDIO_DEVICE: "hw:1,0"

# Mount /dev/snd from the host so FFmpeg can access the ALSA sound card.
audioDevice:
  enabled: true
  hostPath: /dev/snd
