<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Streamer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1a24;
      border: 1px solid #2e2e3e;
      border-radius: 16px;
      padding: 40px;
      width: 360px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    h1 { font-size: 1.4rem; font-weight: 600; color: #fff; margin-bottom: 6px; }
    .subtitle { font-size: 0.8rem; color: #888; margin-bottom: 32px; }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 28px;
      padding: 8px 16px;
      border-radius: 20px;
      background: #12121a;
      border: 1px solid #2a2a3a;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s;
    }
    .dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
    .dot.ready      { background: #10b981; }
    .dot.playing    { background: #3b82f6; animation: pulse 0.8s infinite; }
    .dot.error      { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .play-btn {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: #fff;
      font-size: 1.6rem;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      margin-bottom: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .play-btn:hover:not(:disabled) { transform: scale(1.06); }
    .play-btn:active:not(:disabled) { transform: scale(0.96); }
    .play-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .codec-info {
      font-size: 0.75rem;
      color: #555;
      line-height: 1.6;
    }
    .codec-info span { color: #6b7280; }

    .buffer-bar {
      margin-top: 16px;
      height: 4px;
      background: #1e1e2e;
      border-radius: 2px;
      overflow: hidden;
    }
    .buffer-fill {
      height: 100%;
      background: #3b82f6;
      width: 0%;
      transition: width 0.3s;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Audio Streamer</h1>
    <p class="subtitle">Line-In → FLAC → WebSocket → Browser</p>

    <div class="status">
      <div class="dot connecting" id="dot"></div>
      <span id="status-text">Connecting…</span>
    </div>

    <br />
    <button class="play-btn" id="play-btn" disabled title="Play">▶</button>

    <div class="codec-info" id="codec-info">
      <span>FLAC</span> · Lossless · Level 5 · Stereo<br />
      <span>WebSocket</span> low-latency stream
    </div>

    <div class="buffer-bar">
      <div class="buffer-fill" id="buffer-fill"></div>
    </div>
  </div>

  <script type="module">
    import { FLACDecoder } from '/flac-decoder.esm.js';

    const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws`;

    const dotEl      = document.getElementById('dot');
    const statusEl   = document.getElementById('status-text');
    const playBtn    = document.getElementById('play-btn');
    const codecInfo  = document.getElementById('codec-info');

    let audioCtx;
    let nextStartTime = 0;
    let ws;
    let streamConfig = null;
    let playing = false;

    // Initialize WASM FLAC decoder (streaming-capable)
    const flacDecoder = new FLACDecoder();
    await flacDecoder.ready;

    function setStatus(state, text) {
      dotEl.className = 'dot ' + state;
      statusEl.textContent = text;
    }

    // ── WebSocket ─────────────────────────────────────────────────────────────

    function connect() {
      setStatus('connecting', 'Connecting…');
      ws = new WebSocket(WS_URL);
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        flacDecoder.reset();
        nextStartTime = 0;
        setStatus('connecting', 'Waiting for config…');
      };

      ws.onmessage = async (ev) => {
        if (typeof ev.data === 'string') {
          streamConfig = JSON.parse(ev.data);
          const { sampleRate, channels } = streamConfig;
          codecInfo.innerHTML =
            `<span>FLAC</span> · Lossless · Level 5 · ${sampleRate} Hz · ${channels}ch<br />` +
            `<span>WebSocket</span> low-latency stream`;
          if (playing) {
            setStatus('playing', 'Playing');
          } else {
            setStatus('ready', 'Ready — click ▶ to play');
          }
          playBtn.disabled = false;
          return;
        }

        // Binary FLAC data — decode and schedule for playback
        if (!playing || !audioCtx) return;

        const { channelData, samplesDecoded } = await flacDecoder.decode(new Uint8Array(ev.data));
        if (samplesDecoded === 0) return;

        const ch = channelData.length;
        const audioBuffer = audioCtx.createBuffer(ch, samplesDecoded, streamConfig.sampleRate);
        for (let c = 0; c < ch; c++) {
          audioBuffer.copyToChannel(channelData[c], c);
        }

        const source = audioCtx.createBufferSource();
        source.buffer = audioBuffer;
        source.connect(audioCtx.destination);

        const startTime = Math.max(audioCtx.currentTime, nextStartTime);
        source.start(startTime);
        nextStartTime = startTime + audioBuffer.duration;
      };

      ws.onclose = () => {
        if (playing) {
          setStatus('playing', 'Reconnecting…');
        } else {
          setStatus('error', 'Disconnected — retrying…');
        }
        setTimeout(connect, 1000);
      };

      ws.onerror = () => ws.close();
    }

    // ── Play button ──────────────────────────────────────────────────────────

    playBtn.addEventListener('click', async () => {
      if (!streamConfig) return;

      if (!playing) {
        try {
          if (!audioCtx) {
            audioCtx = new AudioContext({
              sampleRate: streamConfig.sampleRate,
              latencyHint: 'interactive',
            });
          }
          nextStartTime = 0;
          if (audioCtx.state === 'suspended') await audioCtx.resume();
          playing = true;
          playBtn.textContent = '⏸';
          setStatus('playing', 'Playing');
        } catch (e) {
          setStatus('error', 'Playback error: ' + e.message);
        }
      } else {
        playing = false;
        if (audioCtx) await audioCtx.suspend();
        playBtn.textContent = '▶';
        setStatus('ready', 'Paused');
      }
    });

    connect();
  </script>
</body>
</html>
