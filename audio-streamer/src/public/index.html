<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Streamer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1a24;
      border: 1px solid #2e2e3e;
      border-radius: 16px;
      padding: 40px;
      width: 360px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    h1 { font-size: 1.4rem; font-weight: 600; color: #fff; margin-bottom: 6px; }
    .subtitle { font-size: 0.8rem; color: #888; margin-bottom: 32px; }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 28px;
      padding: 8px 16px;
      border-radius: 20px;
      background: #12121a;
      border: 1px solid #2a2a3a;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s;
    }
    .dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
    .dot.ready      { background: #10b981; }
    .dot.playing    { background: #3b82f6; animation: pulse 0.8s infinite; }
    .dot.error      { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .play-btn {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: #fff;
      font-size: 1.6rem;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      margin-bottom: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .play-btn:hover:not(:disabled) { transform: scale(1.06); }
    .play-btn:active:not(:disabled) { transform: scale(0.96); }
    .play-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .codec-info {
      font-size: 0.75rem;
      color: #555;
      line-height: 1.6;
    }
    .codec-info span { color: #6b7280; }

    .buffer-bar {
      margin-top: 16px;
      height: 4px;
      background: #1e1e2e;
      border-radius: 2px;
      overflow: hidden;
    }
    .buffer-fill {
      height: 100%;
      background: #3b82f6;
      width: 0%;
      transition: width 0.3s;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Audio Streamer</h1>
    <p class="subtitle">Line-In → PCM → WebSocket → Browser</p>

    <div class="status">
      <div class="dot connecting" id="dot"></div>
      <span id="status-text">Connecting…</span>
    </div>

    <br />
    <button class="play-btn" id="play-btn" disabled title="Play">▶</button>

    <div class="codec-info" id="codec-info">
      <span>PCM</span> · Lossless · 16-bit · Stereo<br />
      <span>WebSocket</span> low-latency stream
    </div>

    <div class="buffer-bar">
      <div class="buffer-fill" id="buffer-fill"></div>
    </div>
  </div>

  <script>
    const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws`;

    const dotEl      = document.getElementById('dot');
    const statusEl   = document.getElementById('status-text');
    const playBtn    = document.getElementById('play-btn');
    const codecInfo  = document.getElementById('codec-info');
    const bufferFill = document.getElementById('buffer-fill');

    let audioCtx, scriptNode;
    let ws;
    let streamConfig = null;
    let playing = false;
    // Ring buffer for PCM float samples (interleaved)
    let pcmBuffer = new Float32Array(0);

    function setStatus(state, text) {
      dotEl.className = 'dot ' + state;
      statusEl.textContent = text;
    }

    // ── WebSocket ─────────────────────────────────────────────────────────────

    function connect() {
      setStatus('connecting', 'Connecting…');
      ws = new WebSocket(WS_URL);
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => setStatus('connecting', 'Waiting for config…');

      ws.onmessage = (ev) => {
        if (typeof ev.data === 'string') {
          // JSON config message
          streamConfig = JSON.parse(ev.data);
          const { sampleRate, channels, bitDepth } = streamConfig;
          codecInfo.innerHTML =
            `<span>PCM</span> · Lossless · ${bitDepth}-bit · ${sampleRate} Hz · ${channels}ch<br />` +
            `<span>WebSocket</span> low-latency stream`;
          if (playing) {
            setStatus('playing', 'Playing');
          } else {
            setStatus('ready', 'Ready — click ▶ to play');
          }
          playBtn.disabled = false;
          return;
        }

        // Binary PCM data — accumulate in ring buffer
        if (!playing && !audioCtx) return;

        const s16 = new Int16Array(ev.data);
        const f32 = new Float32Array(s16.length);
        for (let i = 0; i < s16.length; i++) {
          f32[i] = s16[i] / 32768;
        }
        // Append to buffer (cap at ~5s to absorb reconnections)
        const maxSamples = streamConfig.sampleRate * streamConfig.channels * 5;
        const merged = new Float32Array(pcmBuffer.length + f32.length);
        merged.set(pcmBuffer);
        merged.set(f32, pcmBuffer.length);
        pcmBuffer = merged.length > maxSamples ? merged.subarray(merged.length - maxSamples) : merged;
      };

      ws.onclose = () => {
        if (playing) {
          // Keep playing state, just reconnect transparently
          setStatus('playing', 'Reconnecting…');
        } else {
          setStatus('error', 'Disconnected — retrying…');
        }
        setTimeout(connect, 1000);
      };

      ws.onerror = () => ws.close();
    }

    // ── Play button ──────────────────────────────────────────────────────────

    playBtn.addEventListener('click', async () => {
      if (!streamConfig) return;

      if (!playing) {
        try {
          const ch = streamConfig.channels;
          if (!audioCtx) {
            audioCtx = new AudioContext({
              sampleRate: streamConfig.sampleRate,
              latencyHint: 'playback',
            });
            const bufSize = 4096;
            scriptNode = audioCtx.createScriptProcessor(bufSize, 0, ch);
            scriptNode.onaudioprocess = (e) => {
              const out = e.outputBuffer;
              const frames = out.length;
              const needed = frames * ch;
              if (pcmBuffer.length >= needed) {
                for (let i = 0; i < frames; i++) {
                  for (let c = 0; c < ch; c++) {
                    out.getChannelData(c)[i] = pcmBuffer[i * ch + c];
                  }
                }
                pcmBuffer = pcmBuffer.subarray(needed);
              } else {
                for (let c = 0; c < ch; c++) out.getChannelData(c).fill(0);
              }
            };
            scriptNode.connect(audioCtx.destination);
          }
          if (audioCtx.state === 'suspended') await audioCtx.resume();
          playing = true;
          playBtn.textContent = '⏸';
          setStatus('playing', 'Playing');
        } catch (e) {
          setStatus('error', 'Playback error: ' + e.message);
        }
      } else {
        playing = false;
        if (audioCtx) await audioCtx.suspend();
        playBtn.textContent = '▶';
        setStatus('ready', 'Paused');
      }
    });

    connect();
  </script>
</body>
</html>
